<!DOCTYPE html>
<html lang="en">

<head>
     <meta charset="UTF-8">
     <title>Week 3 - HTML Forms Example</title>
     <style>
          input {
               display:block; 
          }

          input[type="submit"] {
               margin-top: 1rem; 
          }
          label {
               display:block; 
               margin: 1rem 0; 
          }
     </style>
</head>

<body>
    <h1> Student Information</h1> 

    <form method="post" action="" >
        <fieldset> 
            <Legend> Student Details </Legend>

            <p> * is required information </p>

            <label for="Fullname"> Fullname: *</label>
            <input type="text" name="Fullname" id="Fullname" required>

            <!-- add email, date of birth, program,password, submit button-->

             <label for="email"> Enter your Email: *</label>
             <input type="email" name="email" id="email" placeholder="email" required>

             <label for="dob"> Date of Birth: </label>
             <input type="text" name="dob" id="dob">

             
             <label for="program"> Enter your program name: *</label>
             <select id="program" name="program" required>
                <option value="">Select your program</option>
                <option value="computer_programming">Computer Programming</option>
                <option value="cyber_security">Cyber Security</option>
                <option value="web_development">Web Development</option>

             </select>

             <label for="password"> Enter your password *</label>
             <input type="password" name="password" id="password" pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$" 
             title="Muat contain 1 number, 1 uppercase character, 1 lowercase character, a special character and be 8 character in length" required>

             <label for="password_confirm"> Confirm your Password *</label>
             <input type="password" name="password_confirm" id="password_confirm" required>

             <input type="submit" value="Submit Form">


        </fieldset>
    </form>


</body>

</html>
