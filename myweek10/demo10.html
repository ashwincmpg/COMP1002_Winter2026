<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>DOM Demo 1 – Selecting Elements (Student)</title>
    <style>
      body {
        font-family: Arial;
        margin: 40px;
        background: #f5f7fb;
      }
      section {
        background: white;
        padding: 20px;
        border-radius: 10px;
        max-width: 800px;
      }
      button {
        padding: 8px 12px;
        margin: 6px;
      }
      .highlight {
        outline: 3px solid orange;
        background: #fff3cd;
      }
    </style>
  </head>
  <body>
    <section>
      <h1 id="title">Selecting Elements Demo</h1>
      <h1 id="title1">HELLO BUDDY</h1>
      <p class="info">Paragraph A</p>
      <p class="info">Paragraph B</p>

      <button id="tag-btn">Select h1</button>
      <button id="class-btn">Select .info</button>
      <button id="all-btn">Select ALL .info</button>
    </section>

    <script>
      // TODO: Select the h1 when the first button is clicked
      // Hint: querySelector("h1")
      /*let heading = document.querySelector("h1");*/
     /* let heading = document.getElementById("title");
      console.log(heading);*/
      let headings = document.querySelectorAll("h1");
      console.log(headings);

      // TODO: Select the first paragraph with class .info
      // Hint: querySelector(".info")

      //select the element to work with
      //1st para
      let para = document.querySelector(".info");
      console.log(para);

      //now we modify the element
     // para.classList.add("highlight");

      
      //2nd button
      let infoBtn = document.getElementById("class-btn");

      //now we modify the element

      infoBtn.addEventListener('click', function() {
        para.classList.add("highlight");
      })

      

      // TODO: Select ALL paragraphs with class .info
      // Hint: querySelectorAll(".info") and loop through them
      let allInfoPara = document.querySelectorAll(".info");
      console.log(allInfoPara);
      
      allInfoPara.forEach(function(paragraph){
        paragraph.classList.add("highlight");
      })


    </script>
  </body>
</html>
